version: '3.8'

services:
  db:
    image: pgvector/pgvector:16-pgdg
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-jobdiscovery}
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d jobdiscovery"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/code
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET_NAME=${SUPABASE_BUCKET_NAME}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - N8N_WEBHOOK_SECRET=${N8N_WEBHOOK_SECRET}
      - ENVIRONMENT=development
      - DEBUG=true
      - DAILY_DIGEST_HOUR=${DAILY_DIGEST_HOUR:-8}
      - DAILY_DIGEST_MINUTE=${DAILY_DIGEST_MINUTE:-0}
      - WEEKLY_DIGEST_HOUR=${WEEKLY_DIGEST_HOUR:-8}
      - WEEKLY_DIGEST_MINUTE=${WEEKLY_DIGEST_MINUTE:-0}
      - WEEKLY_DIGEST_DAY_OF_WEEK=${WEEKLY_DIGEST_DAY_OF_WEEK:-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.services.celery_app.celery worker --loglevel=info
    volumes:
      - ./backend:/code
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET_NAME=${SUPABASE_BUCKET_NAME}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - ENVIRONMENT=development
      - DEBUG=true
      - DAILY_DIGEST_HOUR=${DAILY_DIGEST_HOUR:-8}
      - DAILY_DIGEST_MINUTE=${DAILY_DIGEST_MINUTE:-0}
      - WEEKLY_DIGEST_HOUR=${WEEKLY_DIGEST_HOUR:-8}
      - WEEKLY_DIGEST_MINUTE=${WEEKLY_DIGEST_MINUTE:-0}
      - WEEKLY_DIGEST_DAY_OF_WEEK=${WEEKLY_DIGEST_DAY_OF_WEEK:-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.services.celery_app.celery beat --loglevel=info
    volumes:
      - ./backend:/code
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - SUPABASE_BUCKET_NAME=${SUPABASE_BUCKET_NAME}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL}
      - ENVIRONMENT=development
      - DEBUG=true
      - DAILY_DIGEST_HOUR=${DAILY_DIGEST_HOUR:-8}
      - DAILY_DIGEST_MINUTE=${DAILY_DIGEST_MINUTE:-0}
      - WEEKLY_DIGEST_HOUR=${WEEKLY_DIGEST_HOUR:-8}
      - WEEKLY_DIGEST_MINUTE=${WEEKLY_DIGEST_MINUTE:-0}
      - WEEKLY_DIGEST_DAY_OF_WEEK=${WEEKLY_DIGEST_DAY_OF_WEEK:-1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  postgres_dev_data:
  redis_dev_data:
