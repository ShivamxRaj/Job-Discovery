services:
  # 1. FastAPI Web Server + Celery (Combined for Free Tier)
  - type: web
    name: job-discovery-api
    plan: free
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "bash start.sh"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: job-discovery-redis
          property: connectionString
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: NEXT_PUBLIC_API_URL
        sync: false

  # 2. Redis (Message Broker for Celery)
  - type: redis
    name: job-discovery-redis
    plan: free
    ipAllowList: []

